<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Incidents</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f6f8;
        }
        h2 {
            color: #2c3e50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            background-color: #fff;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
        }
        th {
            background-color: #3498db;
            color: #fff;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #e8f0fe;
        }
        a.button {
            text-decoration: none;
            background-color: #3498db;
            color: #fff;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        a.button:hover {
            background-color: #2980b9;
        }
        td.status {
            font-weight: bold;
            color: #27ae60;
        }
    </style>
</head>
<body>
    <h2>My Incidents</h2>
    <table>
        <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Status</th>
            <th>Created At</th>
        </tr>
        {% for incident in incidents %}
        <tr>
            <td>{{ incident.title }}</td>
            <td>{{ incident.description }}</td>
            <td class="status">{{ incident.status }}</td>
            <td>{{ incident.created_at }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="4">No tickets raised yet.</td></tr>
        {% endfor %}
    </table>
    <a href="{% url 'raise_incident' %}" class="button">Raise New Incident</a>
</body>
</html>
